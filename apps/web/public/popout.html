<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jacly Popout</title>
    <script>
      (() => {
        const theme = localStorage.getItem('theme') || 'system';
        let resolved = theme;
        if (theme === 'system') {
          resolved = window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        }
        document.documentElement.setAttribute('data-theme', resolved);
      })();
    </script>
    <style>
      html,
      body {
        height: 100%;
        width: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        position: relative;
      }

      .flexlayout__floating_window_content,
      .flexlayout__floating_window_content > div {
        height: 100%;
        width: 100%;
      }
    </style>
  </head>
  <body></body>
</html>
